##
# Desktop App Release Workflow
#
# Builds, signs, and publishes the DocBlocks desktop app for Windows,
# macOS, and Linux. Creates a GitHub Release with all platform installers
# attached. electron-updater (integrated in the app) detects these
# releases for automatic updates.
#
# Trigger:
#   - Manual dispatch
#   - Git tag matching `desktop-v*` (e.g., desktop-v0.1.0)
#
# Prerequisites (one-time setup):
#   Windows signing:  Azure Trusted Signing resource + GitHub secrets
#   macOS signing:    Apple Developer certificate + GitHub secrets
#   See packages/desktop/scripts/notarize.cjs + sign.cjs for env vars.
##

name: Release Desktop App

on:
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release (uncheck to publish immediately)'
        required: false
        default: true
        type: boolean
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Windows — Build + Authenticode sign (Azure Trusted Signing, optional)
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read version
        id: version
        run: |
          $version = node -p "require('./packages/desktop/package.json').version"
          echo "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build upstream packages
        run: npm run build

      - name: Install Trusted Signing SDK
        shell: pwsh
        run: |
          if (-not $env:SIGNING_ENDPOINT) {
            Write-Host "[signing] No AZURE_CODE_SIGNING_ENDPOINT secret — skipping SDK install"
            exit 0
          }
          nuget install Microsoft.Trusted.Signing.Client -Version 1.0.60 -OutputDirectory "${{ runner.temp }}\TrustedSigning"
          $dlibDir = Get-ChildItem "${{ runner.temp }}\TrustedSigning\Microsoft.Trusted.Signing.Client.*\bin\x64" -Directory | Select-Object -First 1
          echo "TRUSTED_SIGNING_DLIB_PATH=$($dlibDir.FullName)\Azure.CodeSigning.Dlib.dll" >> $env:GITHUB_ENV
          $metadata = @{
            Endpoint = "$env:SIGNING_ENDPOINT"
            CodeSigningAccountName = "$env:SIGNING_ACCOUNT"
            CertificateProfileName = "$env:SIGNING_PROFILE"
          } | ConvertTo-Json
          $metadataPath = "${{ runner.temp }}\metadata.json"
          Set-Content -Path $metadataPath -Value $metadata
          echo "TRUSTED_SIGNING_METADATA_PATH=$metadataPath" >> $env:GITHUB_ENV
        env:
          SIGNING_ENDPOINT: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT }}
          SIGNING_ACCOUNT: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
          SIGNING_PROFILE: ${{ secrets.AZURE_CERT_PROFILE_NAME }}

      - name: Build + package desktop (Windows)
        run: npm run dist:win -w docblocks-desktop -- --publish never
        env:
          TRUSTED_SIGNING_DLIB_PATH: ${{ env.TRUSTED_SIGNING_DLIB_PATH }}
          TRUSTED_SIGNING_METADATA_PATH: ${{ env.TRUSTED_SIGNING_METADATA_PATH }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            packages/desktop/dist/artifacts/*.exe
            packages/desktop/dist/artifacts/*.exe.blockmap
            packages/desktop/dist/artifacts/latest.yml
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # macOS — Build + sign + notarize
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build upstream packages
        run: npm run build

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12_BASE64" ]; then
            echo "[signing] No APPLE_CERTIFICATE_P12_BASE64 secret — skipping certificate import"
            exit 0
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Build + package desktop (macOS)
        run: |
          sudo launchctl limit maxfiles 524288 524288
          ulimit -n 524288
          npm run dist:mac -w docblocks-desktop -- --publish never
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          UV_THREADPOOL_SIZE: 16

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            packages/desktop/dist/artifacts/*.dmg
            packages/desktop/dist/artifacts/*.dmg.blockmap
            packages/desktop/dist/artifacts/latest-mac.yml
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # Linux — Build (no signing)
  # ──────────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build upstream packages
        run: npm run build

      - name: Build + package desktop (Linux)
        run: npm run dist:linux -w docblocks-desktop -- --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            packages/desktop/dist/artifacts/*.AppImage
            packages/desktop/dist/artifacts/*.deb
            packages/desktop/dist/artifacts/latest-linux.yml
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # Release — Collect all artifacts and create GitHub Release
  # ──────────────────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('desktop-v{0}', needs.build-windows.outputs.version) }}
          name: DocBlocks Desktop v${{ needs.build-windows.outputs.version }}
          draft: ${{ inputs.draft || false }}
          generate_release_notes: true
          files: |
            artifacts/windows-artifacts/*
            artifacts/macos-artifacts/*
            artifacts/linux-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
