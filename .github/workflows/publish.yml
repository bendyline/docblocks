name: Release & Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: 'Deploy site to GitHub Pages'
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'release'
  cancel-in-progress: false

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # ── Pages ────────────────────────────────────────────────────
      - name: Build site
        if: inputs.deploy_pages
        run: npm run build -w docblocks-site
        env:
          VITE_BASE: /docblocks/

      - name: Upload pages artifact
        if: inputs.deploy_pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/site/dist

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    if: inputs.deploy_pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
